steps:
  # Build Docker image (the Dockerfile installs deps via `npm ci` on node:22-alpine,
  # matching the lockfile — no redundant top-level install on a mismatched node:latest).
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/graffiticode/l0176:$COMMIT_SHA'
      - '.'

  # Push image to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - 'gcr.io/graffiticode/l0176:$COMMIT_SHA'
    id: Push

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    args:
      - run
      - deploy
      - l0176
      - '--platform=managed'
      - '--image=gcr.io/graffiticode/l0176:$COMMIT_SHA'
      - >-
        --labels=commit-sha=$COMMIT_SHA,gcb-build-id=$BUILD_ID,gcb-trigger-id=$_TRIGGER_ID
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
      # AUTH_URL + LEARNOSITY_KEY are non-secret env vars (the consumer key ships
      # in every browser-delivered signed request). The Learnosity signing secret
      # and GRAFFITICODE_SECRET_KEY are pulled from Secret Manager. All must be
      # set on every deploy — --set-env-vars/--set-secrets replace the service's
      # full env/secret sets, so omitting any would drop it. Mirrors l0158.
      #
      # GRAFFITICODE_SECRET_KEY is the key get-val-private uses to decrypt
      # console-supplied secrets (e.g. a program-provided learnosity-secret that
      # gates save-to-itembank writes). Without it, decrypt() returns the raw
      # ciphertext and the Data API write is signed with garbage → Learnosity
      # 41003 "signatures do not match". Its value MUST match the console's key
      # (project graffiticode-app) and MUST NEVER CHANGE, or previously-encrypted
      # values become undecryptable — propagate it with
      # console/scripts/set-compiler-secret.sh 0176 (creates the secret in
      # project graffiticode + grants the runtime SA access), never by hand.
      - '--set-env-vars=AUTH_URL=$_AUTH_URL,LEARNOSITY_KEY=$_LEARNOSITY_KEY'
      - '--set-secrets=LEARNOSITY_SECRET=learnosity-secret:latest,GRAFFITICODE_SECRET_KEY=GRAFFITICODE_SECRET_KEY:latest'
      - '--allow-unauthenticated'
    id: Deploy
    entrypoint: gcloud

images:
  - 'gcr.io/graffiticode/l0176:$COMMIT_SHA'

options:
  substitutionOption: ALLOW_LOOSE

substitutions:
  _DEPLOY_REGION: us-central1
  _AUTH_URL: https://auth.graffiticode.org
  # Learnosity consumer key (non-secret; delivered to the browser in every signed
  # request). The paired signing secret is the Secret Manager secret
  # `learnosity-secret`, wired via --set-secrets above.
  _LEARNOSITY_KEY: UsF4dy1YxZd4JIyq

tags:
  - l0176